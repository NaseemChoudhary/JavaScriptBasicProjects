<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Show / Hide Password</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="container">
    <div class="card">
      <h1>Show / Hide Password</h1>
      <p>Use the button to toggle password visibility securely.</p>

      <label class="input-group" for="passwordInput">
        <span>Password</span>
        <div class="password-field">
          <input id="passwordInput" type="password" placeholder="Enter your password" />
          <button id="toggleBtn" type="button" aria-label="Show password">Show</button>
        </div>
      </label>

      <div class="help-text">
        <p>Click the button to view or hide the password. The value stays in the field while toggling visibility.</p>
      </div>
    </div>
  </main>

  <script src="index.js"></script>
</body>
</html>
