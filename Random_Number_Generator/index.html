<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Random Generator</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="main">
      <p id="h1">🔢</p>
      <button id="random">⚙️ Roll</button><br /><br />
      <label>MODE:</label>
      <select id="mode">
        <option value="range">Range</option>
        <option value="dice1">🎲 dice</option>
        <option value="dice2">🎲🎲</option>
        <option value="dice3">🎲🎲🎲</option>
       <option value="coin">Coin Flip</option>
    </select>
        <br>
      <div id="rangeInputs">
        <label>MIN :</label>
        <input id="min" type="number" /><br />
        <label>MAX:</label>
        <input id="max" type="number" /><br />
      </div>
    </div>

    <script src="index.js"></script>
  </body>
</html>
